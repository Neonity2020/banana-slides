appId: com.banana.slides
productName: Banana Slides
electronDist: node_modules/electron/dist

directories:
  output: dist
  buildResources: resources

afterPack: scripts/adhoc-sign-macos.js

files:
  - "main.js"
  - "python-manager.js"
  - "preload.js"
  - "auto-updater.js"
  - "update-policy.js"
  - "build-meta.json"
  - "splash.html"
  - "logo.png"
  - "resources/icon.icns"
  - "resources/icon.ico"
  - "resources/icon.png"
  - "package.json"
  - "node_modules/**/*"

extraResources:
  - from: "resources/icon.ico"
    to: "icon.ico"
  - from: "resources/icon.png"
    to: "icon.png"
  - from: "backend/"
    to: "backend"
    filter:
      - "**/*"
  - from: "frontend/"
    to: "frontend"
    filter:
      - "**/*"
  - from: "ffmpeg/"
    to: "ffmpeg"
    filter:
      - "ffmpeg"
      - "ffmpeg.exe"
      - "ffprobe"
      - "ffprobe.exe"

icon: resources/icon

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "BananaSlides-${version}-win-${arch}-Setup.${ext}"

mac:
  icon: resources/icon.icns
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: "BananaSlides-${version}-mac-${arch}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Office
  maintainer: "Anionex <contact@anionex.com>"
  artifactName: "BananaSlides-${version}-linux-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Banana Slides"
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerSidebar: resources/installerSidebar.bmp
  installerHeader: resources/installerHeader.bmp

compression: normal
